name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version

      - name: Create and boot simulator
        run: |
          sudo xcodebuild -runFirstLaunch
          sleep 30
          
          # List available runtimes
          xcrun simctl list runtimes available
          
          # Create a simulator device
          SIM_UDID=$(xcrun simctl create "TestSim" \
            "com.apple.CoreSimulator.SimDeviceType.iPhone-16" \
            "com.apple.CoreSimulator.SimRuntime.iOS-18-4" 2>/dev/null || \
            xcrun simctl list devices available | grep -o '[a-f0-9-]*' | head -1)
          
          # If creation failed, list available simulators
          xcrun simctl list devices available
          
          # Boot the simulator
          xcrun simctl boot "$SIM_UDID" 2>/dev/null || true
          sleep 10
          
          # List booted devices
          xcrun simctl list devices booted

      - name: Build
        run: |
          xcodebuild \
            -project "Our Love.xcodeproj" \
            -scheme "Our Love" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator" \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        working-directory: .

      - name: Test
        run: |
          xcodebuild \
            -project "Our Love.xcodeproj" \
            -scheme "Our Love" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator" \
            -configuration Debug \
            test \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        working-directory: .

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.xccovarchive"
          retention-days: 30