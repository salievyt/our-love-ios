name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version

      - name: Setup Simulator
        run: |
          sudo xcodebuild -runFirstLaunch
          sleep 30
          xcrun simctl list devices available

      - name: Build
        run: |
          xcodebuild \
            -project "Our Love.xcodeproj" \
            -scheme "Our Love" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator" \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        working-directory: .

      - name: Test
        run: |
          xcodebuild \
            -project "Our Love.xcodeproj" \
            -scheme "Our Love" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator" \
            -configuration Debug \
            test \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        working-directory: .

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.xccovarchive"
          retention-days: 30
